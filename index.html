<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Peminjaman Kunci</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container my-5">
        <h2 class="text-center mb-4">🔑 Sistem Reservasi & Peminjaman Kunci</h2>
        
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card p-4 shadow-sm">
                    <h4>Formulir Peminjaman</h4>
                    <form id="formPinjam">
                        <div class="mb-3">
                            <label class="form-label">Nama Peminjam</label>
                            <input type="text" id="nama" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Pilih Kunci</label>
                            <select id="kunci" class="form-select" required>
                                <option value="Kunci_01">Kunci BM</option>
                                <option value="Kunci_02">Kunci MO</option>
                                <option value="Kunci_03">Kunci Ruang Server</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Pinjam Kunci</button>
                    </form>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card p-4 shadow-sm">
                    <h4>Status Kunci Saat Ini</h4>
                    <ul class="list-group mt-3">
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            Kunci BM
                            <span class="badge bg-success">Tersedia</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            Kunci MO
                            <span class="badge bg-danger">Dipinjam</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. GANTI URL DI BAWAH INI DENGAN URL WEB APP DARI GOOGLE APPS SCRIPT ANDA
        const scriptURL = https://script.google.com/a/macros/23semarang.id/s/AKfycbx2-rFmbX5vQdI-K2oO1wvECK2lFQv2ADChPCJ46ItpI6nKLn9_knadWL6Gamvd7P2MuA/exec;
        const form = document.getElementById('formPinjam');

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            // Mengubah teks tombol agar pengguna tahu data sedang diproses
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerText = 'Menyimpan...';

            // Mengambil data dari form
            const formData = new FormData();
            formData.append('nama', document.getElementById('nama').value);
            formData.append('kunci', document.getElementById('kunci').value);

            // Mengirim data ke Google Sheets
            fetch(scriptURL, { 
                method: 'POST', 
                body: formData
            })
            .then(response => {
                alert('Peminjaman berhasil dicatat! Status kunci akan segera diperbarui.');
                form.reset();
            })
            .catch(error => {
                alert('Waduh, ada yang salah: ' + error.message);
                console.error('Error!', error.message);
            })
            .finally(() => {
                // Kembalikan tombol ke status semula
                submitBtn.disabled = false;
                submitBtn.innerText = 'Pinjam Kunci';
            });
        });
    </script>
</body>
</html>
