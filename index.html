<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Peminjaman Kunci</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container my-5">
        <h2 class="text-center mb-4">🔑 Sistem Reservasi & Peminjaman Kunci</h2>
        
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card p-4 shadow-sm">
                    <h4>Formulir Peminjaman</h4>
                    <form id="formPinjam">
                        <div class="mb-3">
                            <label class="form-label">Nama Peminjam</label>
                            <input type="text" id="nama" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Pilih Kunci</label>
                            <select id="kunci" class="form-select" required>
                                <option value="Kunci_01">Kunci Ruang Rapat Utama</option>
                                <option value="Kunci_02">Kunci Laboratorium Komputer</option>
                                <option value="Kunci_03">Kunci Ruang Server</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Pinjam Kunci</button>
                    </form>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card p-4 shadow-sm">
                    <h4>Status Kunci Saat Ini</h4>
                    <ul class="list-group mt-3">
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            Kunci Ruang Rapat Utama
                            <span class="badge bg-success">Tersedia</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            Kunci Laboratorium Komputer
                            <span class="badge bg-danger">Dipinjam</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = https://script.google.com/a/macros/23semarang.id/s/AKfycbx2-rFmbX5vQdI-K2oO1wvECK2lFQv2ADChPCJ46ItpI6nKLn9_knadWL6Gamvd7P2MuA/exec;
        const form = document.getElementById('formPinjam');

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            const data = {
                nama: document.getElementById('nama').value,
                kunci: document.getElementById('kunci').value
            };

            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify(data),
                headers: { 'Content-Type': 'application/plain' }
            })
            .then(response => {
                alert('Peminjaman berhasil dicatat!');
                form.reset();
            })
            .catch(error => console.error('Error!', error.message));
        });
    </script>
</body>
</html>
