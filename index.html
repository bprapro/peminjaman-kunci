<script>
        // 1. GANTI URL DI BAWAH INI DENGAN URL WEB APP DARI GOOGLE APPS SCRIPT ANDA
        const scriptURL = https://script.google.com/a/macros/23semarang.id/s/AKfycbx2-rFmbX5vQdI-K2oO1wvECK2lFQv2ADChPCJ46ItpI6nKLn9_knadWL6Gamvd7P2MuA/exec;
        const form = document.getElementById('formPinjam');

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            // Mengubah teks tombol agar pengguna tahu data sedang diproses
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerText = 'Menyimpan...';

            // Mengambil data dari form
            const formData = new FormData();
            formData.append('nama', document.getElementById('nama').value);
            formData.append('kunci', document.getElementById('kunci').value);

            // Mengirim data ke Google Sheets
            fetch(scriptURL, { 
                method: 'POST', 
                body: formData
            })
            .then(response => {
                alert('Peminjaman berhasil dicatat! Status kunci akan segera diperbarui.');
                form.reset();
            })
            .catch(error => {
                alert('Waduh, ada yang salah: ' + error.message);
                console.error('Error!', error.message);
            })
            .finally(() => {
                // Kembalikan tombol ke status semula
                submitBtn.disabled = false;
                submitBtn.innerText = 'Pinjam Kunci';
            });
        });
    </script>
